version: '3.9'

services:
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - CORS_ORIGIN=http://localhost:3001
      - AUTH_SERVICE_URL=http://auth-service:3002
      - NOTES_SERVICE_URL=http://notes-service:3003
      - QUIZ_SERVICE_URL=http://quiz-service:3004
      - AI_SERVICE_URL=http://ai-service:3005
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX_REQUESTS=100
    depends_on:
      - auth-service
      - notes-service
      - quiz-service
      - ai-service
      - redis
    networks:
      - microservices-network

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    networks:
      - microservices-network

volumes:
  redis-data:

networks:
  microservices-network:
    driver: bridge
